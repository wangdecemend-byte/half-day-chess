<script>
// ============================================================
// 半日棋堂 — Web 版
// 从微信小游戏转换：所有 wx.* API → Web 标准 API
// ============================================================

// ── Shared Web Audio Context ──
var _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { _audioCtx = null; }
  }
  // Resume if suspended (browser autoplay policy)
  if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// ── Toast ──
var _toastTimer = null;
function showToast(msg, dur) {
  dur = dur || 1500;
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.remove('show'); }, dur);
}

// ── Modal ──
function showModal(title, content, onOk, onCancel) {
  // Simple confirm-based modal for now
  if (confirm(title + '\n' + content)) { if (onOk) onOk(); }
  else { if (onCancel) onCancel(); }
}

// ── LocalStorage wrappers ──
function storageSet(k, v) { try { localStorage.setItem(k, v); } catch(e){} }
function storageGet(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
function storageRemove(k) { try { localStorage.removeItem(k); } catch(e){} }

// ============================================================
// Module: utils/game-logic.js (zero changes)
// ============================================================
var SZ = 19;

function neighbors(x, y) {
  var r = [];
  if (x > 0)      r.push([x - 1, y]);
  if (x < SZ - 1) r.push([x + 1, y]);
  if (y > 0)      r.push([x, y - 1]);
  if (y < SZ - 1) r.push([x, y + 1]);
  return r;
}

function getGroup(x, y, map) {
  var k = x + ',' + y;
  if (!map.has(k)) return [];
  var target = map.get(k);
  var color = target && target.color ? target.color : target;
  var visited = {}, group = [], stack = [[x, y]];
  while (stack.length) {
    var p = stack.pop(), ck = p[0] + ',' + p[1];
    if (visited[ck]) continue;
    var val = map.get(ck);
    var cc = val && val.color ? val.color : val;
    if (cc !== color) continue;
    visited[ck] = true; group.push(p);
    var nbs = neighbors(p[0], p[1]);
    for (var i = 0; i < nbs.length; i++) {
      if (!visited[nbs[i][0] + ',' + nbs[i][1]]) stack.push(nbs[i]);
    }
  }
  return group;
}

function getLiberties(group, map) {
  var libs = {};
  for (var i = 0; i < group.length; i++) {
    var nbs = neighbors(group[i][0], group[i][1]);
    for (var j = 0; j < nbs.length; j++) {
      var nk = nbs[j][0] + ',' + nbs[j][1];
      if (!map.has(nk)) libs[nk] = true;
    }
  }
  return Object.keys(libs).length;
}

function isKo(x, y, stoneMap, koPoint) {
  if (koPoint && koPoint[0] === x && koPoint[1] === y) return true;
  return false;
}

function calcKoPoint(x, y, captured, stoneMap, moves) {
  if (!captured || captured.length !== 1) return null;
  var cap = captured[0];
  var nbs = neighbors(x, y);
  var adj = false;
  for (var i = 0; i < nbs.length; i++) {
    if (nbs[i][0] === cap[0] && nbs[i][1] === cap[1]) { adj = true; break; }
  }
  if (!adj) return null;
  var sg = getGroup(x, y, stoneMap);
  if (getLiberties(sg, stoneMap) !== 1) return null;
  return cap;
}

function placeStone(x, y, stoneMap, moves, currentIdx, koPoint) {
  var k = x + ',' + y;
  if (stoneMap.has(k) || x < 0 || x >= SZ || y < 0 || y >= SZ) {
    return { success: false, reason: 'occupied' };
  }
  if (isKo(x, y, stoneMap, koPoint)) {
    return { success: false, reason: 'ko' };
  }

  var color = moves.length % 2 === 0 ? 'B' : 'W';

  if (currentIdx < moves.length - 1) {
    moves.splice(currentIdx + 1);
    rebuildStones(stoneMap, moves, currentIdx);
  }

  var moveNum = moves.length + 1;
  moves.push({ x: x, y: y, color: color });
  stoneMap.set(k, { color: color, num: moveNum });

  var opp = color === 'B' ? 'W' : 'B';
  var captured = [];
  var nbs = neighbors(x, y);
  for (var i = 0; i < nbs.length; i++) {
    var nk = nbs[i][0] + ',' + nbs[i][1];
    if (stoneMap.has(nk) && stoneMap.get(nk).color === opp) {
      var g = getGroup(nbs[i][0], nbs[i][1], stoneMap);
      if (getLiberties(g, stoneMap) === 0) {
        for (var j = 0; j < g.length; j++) {
          stoneMap.delete(g[j][0] + ',' + g[j][1]);
          captured.push(g[j]);
        }
      }
    }
  }

  var sg = getGroup(x, y, stoneMap);
  if (getLiberties(sg, stoneMap) === 0) {
    stoneMap.delete(k);
    moves.pop();
    return { success: false, reason: 'suicide' };
  }

  var newKo = calcKoPoint(x, y, captured, stoneMap, moves);
  return { success: true, captured: captured, color: color, moveNum: moveNum, koPoint: newKo };
}

function passMove(stoneMap, moves, currentIdx, koPoint) {
  if (currentIdx < moves.length - 1) {
    moves.splice(currentIdx + 1);
  }
  var color = moves.length % 2 === 0 ? 'B' : 'W';
  moves.push({ x: -1, y: -1, color: color });
  return { success: true, color: color, koPoint: null };
}

function undoMove(stoneMap, moves, currentIdx) {
  if (!moves.length) return { success: false };
  var m = moves.pop();
  var newIdx = Math.min(currentIdx, moves.length - 1);
  if (m.x >= 0) stoneMap.delete(m.x + ',' + m.y);
  rebuildStones(stoneMap, moves, newIdx);
  return { success: true, newIdx: newIdx };
}

function rebuildStones(stoneMap, moves, toIdx) {
  stoneMap.clear();
  for (var i = 0; i <= toIdx; i++) {
    var m = moves[i];
    if (m && m.x >= 0) stoneMap.set(m.x + ',' + m.y, { color: m.color, num: i + 1 });
  }
}

function calculateScore(stoneMap) {
  var territory = {};
  var empty = [];
  for (var x = 0; x < SZ; x++) {
    for (var y = 0; y < SZ; y++) {
      if (!stoneMap.has(x + ',' + y)) {
        empty.push([x, y]);
        territory[x + ',' + y] = null;
      }
    }
  }
  var visited = {};
  for (var i = 0; i < empty.length; i++) {
    var k = empty[i][0] + ',' + empty[i][1];
    if (visited[k]) continue;
    var stack = [empty[i]];
    var region = [];
    var border = { B: false, W: false };
    while (stack.length) {
      var p = stack.pop(), pk = p[0] + ',' + p[1];
      if (visited[pk]) continue;
      visited[pk] = true;
      region.push(p);
      var nbs = neighbors(p[0], p[1]);
      for (var j = 0; j < nbs.length; j++) {
        var nk = nbs[j][0] + ',' + nbs[j][1];
        if (stoneMap.has(nk)) {
          border[stoneMap.get(nk).color] = true;
        } else if (!visited[nk]) {
          stack.push(nbs[j]);
        }
      }
    }
    var owner = 'neutral';
    if (border.B && !border.W) owner = 'B';
    else if (border.W && !border.B) owner = 'W';
    for (var r = 0; r < region.length; r++) {
      territory[region[r][0] + ',' + region[r][1]] = owner;
    }
  }
  var blackTerr = 0, whiteTerr = 0, blackStones = 0, whiteStones = 0;
  for (var kk in territory) {
    if (territory[kk] === 'B') blackTerr++;
    else if (territory[kk] === 'W') whiteTerr++;
  }
  stoneMap.forEach(function (s) {
    if (s.color === 'B') blackStones++;
    else whiteStones++;
  });
  var blackTotal = blackTerr + blackStones;
  var whiteTotal = whiteTerr + whiteStones + 7.5;
  var winner, diff;
  if (blackTotal > whiteTotal) { winner = 'B'; diff = blackTotal - whiteTotal; }
  else { winner = 'W'; diff = whiteTotal - blackTotal; }
  return {
    blackScore: blackTotal, whiteScore: whiteTotal,
    blackTerritory: blackTerr, whiteTerritory: whiteTerr,
    blackStones: blackStones, whiteStones: whiteStones,
    winner: winner, diff: Math.round(diff * 10) / 10
  };
}

function isDoublePass(moves) {
  if (moves.length < 2) return false;
  var last = moves[moves.length - 1];
  var prev = moves[moves.length - 2];
  return last.x < 0 && prev.x < 0;
}

// ============================================================
// Module: utils/sound.js (wx.createWebAudioContext → AudioContext)
// ============================================================
var sound_isAudioOpen = true;

function sound_noise(ctx, ms) {
  var sr = ctx.sampleRate || 44100;
  var len = Math.floor(sr * ms / 1000);
  var buf = ctx.createBuffer(1, len, sr);
  var d = buf.getChannelData(0);
  for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function sound_tick(ctx, freq, q, vol, ms) {
  if (!ctx) return;
  try {
    var t = ctx.currentTime;
    var dur = ms / 1000;
    var src = ctx.createBufferSource();
    src.buffer = sound_noise(ctx, 1);
    var bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = freq;
    bp.Q.value = q;
    var g = ctx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(bp); bp.connect(g); g.connect(ctx.destination);
    src.start(t); src.stop(t + dur);
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq * 0.3;
    var g2 = ctx.createGain();
    g2.gain.setValueAtTime(vol * 0.2, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 2);
    osc.connect(g2); g2.connect(ctx.destination);
    osc.start(t); osc.stop(t + dur * 2);
  } catch(e){}
}

function playBlack() { if (sound_isAudioOpen) sound_tick(getAudioCtx(), 750, 10, 0.4, 85); }
function playWhite() { if (sound_isAudioOpen) sound_tick(getAudioCtx(), 1500, 8, 0.32, 55); }
function playCapture(){ if (sound_isAudioOpen) sound_tick(getAudioCtx(), 480, 6, 0.28, 110); }
function sound_toggleAudio() { sound_isAudioOpen = !sound_isAudioOpen; return sound_isAudioOpen; }

// ============================================================
// Module: utils/music.js (wx.createWebAudioContext → AudioContext)
// ============================================================
var music_SCALE = [294, 330, 392, 440, 523, 587, 659, 784, 880];
var music_BEAT = 440;
var music_MELODY = [
  [0,3],[2,2],[3,2],[4,2], [5,3],[4,1],[3,2],[2,2],
  [0,2],[2,2],[0,2],[2,3], [3,2],[4,2],[3,1],[2,1],[0,3],
  [5,2],[6,3],[5,2],[4,2], [3,3],[4,1],[3,1],[2,3],
  [0,3],[3,2],[4,2],[5,2], [6,3],[5,1],[4,2],[3,2],
  [2,2],[3,2],[2,2],[0,3], [3,2],[2,1],[0,1],[1,3],
  [0,4], [2,2],[3,2],[4,3], [3,1],[2,2],[0,3],
  [5,2],[4,2],[3,2],[2,2], [0,3],[2,1],[3,1],[5,3],
  [6,2],[5,2],[3,2],[4,3], [3,2],[2,1],[0,3], [0,5]
];
var music_playing = false;
var music_timer = null;
var music_noteIdx = 0;

function music_pluck(freq, durMs, vol, offset) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var t = ctx.currentTime + (offset || 0);
  var dur = durMs / 1000;
  var o1 = ctx.createOscillator(); o1.type = 'sine';
  var g1 = ctx.createGain();
  o1.frequency.value = freq;
  g1.gain.setValueAtTime(vol, t);
  g1.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
  o1.connect(g1); g1.connect(ctx.destination);
  o1.start(t); o1.stop(t + dur);
  var o2 = ctx.createOscillator(); o2.type = 'sine';
  var g2 = ctx.createGain();
  o2.frequency.value = freq * 2;
  g2.gain.setValueAtTime(vol * 0.3, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
  o2.connect(g2); g2.connect(ctx.destination);
  o2.start(t); o2.stop(t + dur * 0.5);
  var o3 = ctx.createOscillator(); o3.type = 'sine';
  var g3 = ctx.createGain();
  o3.frequency.value = freq * 4;
  g3.gain.setValueAtTime(vol * 0.1, t);
  g3.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.3);
  o3.connect(g3); g3.connect(ctx.destination);
  o3.start(t); o3.stop(t + dur * 0.3);
}

function music_slide(fromFreq, toFreq, durMs, offset) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var t = ctx.currentTime + (offset || 0);
  var dur = durMs / 1000;
  var o = ctx.createOscillator(); o.type = 'sine';
  var g = ctx.createGain();
  o.frequency.setValueAtTime(fromFreq, t);
  o.frequency.linearRampToValueAtTime(toFreq, t + dur);
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 1.2);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur * 1.2);
}

function music_echo(freq, durMs, delayMs, offset) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var t = ctx.currentTime + (offset || 0) + delayMs / 1000;
  var dur = durMs / 1000 * 0.6;
  var o = ctx.createOscillator(); o.type = 'sine';
  var g = ctx.createGain();
  o.frequency.value = freq * 2;
  g.gain.setValueAtTime(0.02, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur);
}

function music_next() {
  if (!music_playing) return;
  var m = music_MELODY[music_noteIdx];
  var freq = music_SCALE[m[0]];
  var durMs = m[1] * music_BEAT;
  music_pluck(freq, durMs, 0.12, 0);
  if (m[1] >= 5) {
    music_slide(music_SCALE[Math.max(0, m[0] - 2)], freq, 80, 0);
  }
  if (music_noteIdx % 14 === 7) {
    music_pluck(freq * 0.5, durMs * 1.5, 0.04, 0.03);
  }
  if (music_noteIdx % 10 === 0) {
    music_echo(freq, durMs, 150, 0);
  }
  music_noteIdx = (music_noteIdx + 1) % music_MELODY.length;
  music_timer = setTimeout(music_next, durMs * 0.82);
}

function music_play() {
  if (music_playing) return;
  if (!getAudioCtx()) return;
  music_playing = true;
  music_noteIdx = 0;
  music_next();
}
function music_pause() {
  music_playing = false;
  if (music_timer) { clearTimeout(music_timer); music_timer = null; }
}
function music_toggle() { if (music_playing) music_pause(); else music_play(); return music_playing; }
function music_isPlaying() { return music_playing; }

// ============================================================
// Module: utils/board.js (unchanged except module.exports removed)
// ============================================================
var board_SZ = 19;
var board_HS = [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
var board_COLS = 'ABCDEFGHJKLMNOPQRST';
var board_woodLines = [];
for (var _bi = 0; _bi < 15; _bi++) board_woodLines.push({ pos: Math.random(), h: 1 + Math.random() * 2 });

function board_gx(x, CL, PD) { return PD + x * CL; }
function board_gy(y, CL, PD) { return PD + y * CL; }

function calcLayout(sw, sh) {
  var topH = 80, botH = 130;
  var avH = sh - topH - botH, avW = sw - 24;
  var size = Math.min(avW, avH);
  var CL = size / (board_SZ + 1.2), PD = CL * 0.833;
  var bs = CL * (board_SZ - 1) + PD * 2, SR = CL * 0.44;
  return { CL: CL, PD: PD, SR: SR, boardSize: bs, offsetX: (sw - bs) / 2, offsetY: topH + (avH - bs) / 2 };
}

function drawBgDecor(ctx, w, h, L) {
  ctx.globalAlpha = 0.025; ctx.fillStyle = '#3a2a1a';
  var cs = [[0.08,0.12],[0.92,0.12],[0.08,0.88],[0.92,0.88]];
  for (var c = 0; c < cs.length; c++) {
    for (var r = 0; r < 3; r++) {
      ctx.beginPath(); ctx.arc(cs[c][0]*w, cs[c][1]*h, 18+r*14, Math.PI*0.3, Math.PI*1.2);
      ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 0.6; ctx.stroke();
    }
  }
  ctx.globalAlpha = 0.03;
  ctx.beginPath(); ctx.arc(w*0.88, h*0.78, 36, 0, Math.PI*2);
  ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = '14px sans-serif'; ctx.fillStyle = '#3a2a1a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('棋', w*0.88, h*0.78-2);
  ctx.globalAlpha = 0.015; ctx.fillStyle = '#2a1a0a';
  ctx.beginPath(); ctx.ellipse(w*0.85, h*0.15, 120, 40, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(w*0.15, h*0.85, 100, 30, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.02; ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 0.8;
  for (var l = 0; l < 3; l++) {
    ctx.beginPath(); ctx.moveTo(16+l*10, h*0.2); ctx.lineTo(16+l*10, h*0.8); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawBoard(ctx, L, t) {
  var CL = L.CL, PD = L.PD, ox = L.offsetX, oy = L.offsetY;
  var bC = (t && t.board) || '#d4a050', gC = (t && t.grid) || '#8a6850';
  ctx.fillStyle = '#2a1208';
  ctx.fillRect(ox+PD-CL*0.5, oy+PD-CL*0.5, CL*(board_SZ-1)+CL, CL*(board_SZ-1)+CL);
  ctx.fillStyle = bC;
  ctx.fillRect(ox+PD, oy+PD, CL*(board_SZ-1), CL*(board_SZ-1));
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (var wi = 0; wi < board_woodLines.length; wi++)
    ctx.fillRect(ox+PD, oy+PD+board_woodLines[wi].pos*CL*(board_SZ-1), CL*(board_SZ-1), board_woodLines[wi].h);
  for (var i = 0; i < board_SZ; i++) {
    ctx.strokeStyle = gC; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(ox+board_gx(i,CL,PD), oy+board_gy(0,CL,PD)); ctx.lineTo(ox+board_gx(i,CL,PD), oy+board_gy(board_SZ-1,CL,PD)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+board_gx(0,CL,PD), oy+board_gy(i,CL,PD)); ctx.lineTo(ox+board_gx(board_SZ-1,CL,PD), oy+board_gy(i,CL,PD)); ctx.stroke();
  }
  ctx.fillStyle = '#5a3820';
  for (i = 0; i < board_HS.length; i++) {
    ctx.beginPath(); ctx.arc(ox+board_gx(board_HS[i][0],CL,PD), oy+board_gy(board_HS[i][1],CL,PD), CL*0.09, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = '#3a2818';
  ctx.font = 'bold ' + Math.floor(CL*0.4) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (i = 0; i < board_SZ; i++) {
    ctx.fillText(board_COLS[i], ox+board_gx(i,CL,PD), oy+board_gy(0,CL,PD)-CL*0.38);
    ctx.fillText(board_COLS[i], ox+board_gx(i,CL,PD), oy+board_gy(board_SZ-1,CL,PD)+CL*0.5);
    ctx.fillText(String(board_SZ-i), ox+board_gx(0,CL,PD)-CL*0.45, oy+board_gy(i,CL,PD));
    ctx.fillText(String(board_SZ-i), ox+board_gx(board_SZ-1,CL,PD)+CL*0.5, oy+board_gy(i,CL,PD));
  }
}

function drawStone(ctx, x, y, color, num, L, t) {
  var CL = L.CL, PD = L.PD, SR = L.SR, ox = L.offsetX, oy = L.offsetY;
  var cx = ox+board_gx(x,CL,PD), cy = oy+board_gy(y,CL,PD);
  ctx.fillStyle = color === 'B' ? ((t&&t.black)||'#1a1a1a') : ((t&&t.white)||'#f8f4ec');
  ctx.beginPath(); ctx.arc(cx, cy, SR, 0, Math.PI*2); ctx.fill();
  if (color === 'W') { ctx.strokeStyle = '#c0b8a8'; ctx.lineWidth = 1; ctx.stroke(); }
  if (num && num > 0) {
    ctx.fillStyle = color === 'B' ? '#ccc' : '#555';
    ctx.font = 'bold ' + Math.floor(CL*0.36) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(num), cx, cy+1);
  }
}

function drawStones(ctx, stoneMap, moves, currentIdx, L, t) {
  var CL = L.CL, PD = L.PD, SR = L.SR, ox = L.offsetX, oy = L.offsetY;
  stoneMap.forEach(function(s,k){ var p=k.split(','); drawStone(ctx,+p[0],+p[1],s.color,s.num,L,t); });
  if (currentIdx >= 0 && currentIdx < moves.length) {
    var lm = moves[currentIdx];
    if (lm && lm.x >= 0) {
      ctx.strokeStyle = '#d08060'; ctx.lineWidth = 2;
      ctx.beginPath();
      var cx=ox+board_gx(lm.x,CL,PD), cy=oy+board_gy(lm.y,CL,PD);
      ctx.moveTo(cx-SR*0.6,cy-SR*0.6); ctx.lineTo(cx+SR*0.6,cy-SR*0.6);
      ctx.lineTo(cx+SR*0.6,cy+SR*0.6); ctx.lineTo(cx-SR*0.6,cy+SR*0.6); ctx.closePath(); ctx.stroke();
    }
  }
}

function board_hitTest(mx, my, w, h, L) {
  if (mx >= 6 && mx <= 48 && my >= 8 && my <= 62) return 'back';
  if (mx >= w-138 && mx <= w-94 && my >= 19 && my <= 51) return 'pass';
  if (mx >= w-80 && mx <= w-14 && my >= 19 && my <= 51) return 'undo';
  var barY = h - 120;
  var btns = ['resign', 'pass2', 'rematch'];
  for (var b = 0; b < 3; b++) {
    var bx = 12 + b * ((w-48)/3 + 12);
    if (mx >= bx && mx <= bx+(w-48)/3 && my >= barY+14 && my <= barY+52) return btns[b];
  }
  if (mx >= 12 && mx <= w-12 && my >= barY+60 && my <= barY+100) return 'clear';
  if (mx >= L.offsetX && mx <= L.offsetX+L.boardSize && my >= L.offsetY && my <= L.offsetY+L.boardSize) return 'board';
  return null;
}

function popupHitTest(mx, my, w, h) {
  var cw = w - 48, ch = 280, cx = 24, cy = (h - ch) / 2;
  var by = cy + ch - 70;
  if (mx >= cx+20 && mx <= cx+cw-20 && my >= by && my <= by+46) return 'menu';
  return null;
}

function pixelToBoard(mx, my, L) {
  var CL = L.CL, PD = L.PD, ox = L.offsetX, oy = L.offsetY;
  var bx = mx-ox, by = my-oy;
  var x = Math.round((bx-PD)/CL), y = Math.round((by-PD)/CL);
  var cx = PD+x*CL, cy = PD+y*CL;
  if (Math.sqrt((bx-cx)*(bx-cx)+(by-cy)*(by-cy)) > L.SR*1.3 || x<0||x>=board_SZ||y<0||y>=board_SZ) return null;
  return {x:x,y:y};
}

function _rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function splash_draw(ctx, w, h) {
  var elapsed = (Date.now() - splash_startTime) / 1000;
  var remaining = Math.max(0, 5 - Math.ceil(elapsed));
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(0,0,0,0.012)';
  for (var fi = 0; fi < splash_fibers.length; fi++) ctx.fillRect(0, splash_fibers[fi] * h, w, 1);
  var stones = [
    { c: '#222', x: 0.82, y: 0.18, s: 28, ph: 0 },
    { c: '#eee', x: 0.15, y: 0.13, s: 24, ph: 1.2 },
    { c: '#222', x: 0.12, y: 0.72, s: 26, ph: 2.4 },
    { c: '#eee', x: 0.80, y: 0.65, s: 30, ph: 3.6 },
    { c: '#222', x: 0.78, y: 0.48, s: 22, ph: 4.8 }
  ];
  for (var i = 0; i < stones.length; i++) {
    var sd = stones[i];
    var sx = sd.x * w + Math.cos(elapsed * 0.7 + sd.ph) * 5;
    var sy = sd.y * h + Math.sin(elapsed * 1.2 + sd.ph) * 8;
    ctx.fillStyle = sd.c;
    ctx.beginPath(); ctx.arc(sx, sy, sd.s, 0, Math.PI * 2); ctx.fill();
    if (sd.c === '#eee') { ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke(); }
  }
  ctx.strokeStyle = 'rgba(60,30,10,0.06)';
  ctx.lineWidth = 1;
  var gs = Math.min(w, h) * 0.3, gx = (w - gs) / 2, gy = (h - gs) / 2 - 40;
  for (i = 0; i <= 3; i++) {
    ctx.beginPath(); ctx.moveTo(gx, gy + i * gs / 3); ctx.lineTo(gx + gs, gy + i * gs / 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + i * gs / 3, gy); ctx.lineTo(gx + i * gs / 3, gy + gs); ctx.stroke();
  }
  var chars = [
    { c: '半', x: w / 2 - 96, d: 0.1 }, { c: '日', x: w / 2 - 32, d: 0.3 },
    { c: '棋', x: w / 2 + 32, d: 0.5 }, { c: '堂', x: w / 2 + 96, d: 0.7 }
  ];
  ctx.font = 'bold 52px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var titleY = h * 0.32;
  for (i = 0; i < chars.length; i++) {
    var ch = chars[i];
    var a = Math.min(1, Math.max(0, (elapsed - ch.d) / 0.5));
    ctx.fillStyle = 'rgba(42,26,10,' + a + ')';
    ctx.fillText(ch.c, ch.x, titleY + (elapsed < ch.d ? 10 : 0));

  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'rgba(90,69,53,' + a1 + ')';
  ctx.fillText('璇机奥妙，涵在棋盘', w / 2, h * 0.46);
  var a2 = Math.min(1, Math.max(0, (elapsed - 0.9) / 0.5));
  ctx.fillStyle = 'rgba(90,69,53,' + a2 + ')';
  ctx.fillText('遇见棋盘是你我的奇遇', w / 2, h * 0.46 + 32);
  var rx = w / 2, ry = h - 75, rr = 20;
  ctx.beginPath(); ctx.arc(rx, ry, rr, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(40,20,0,0.1)'; ctx.lineWidth = 3; ctx.stroke();
  var p = Math.min(1, elapsed / 5);
  ctx.beginPath(); ctx.arc(rx, ry, rr, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p);
  ctx.strokeStyle = 'rgba(40,20,0,0.3)'; ctx.stroke();
  ctx.font = 'bold 18px sans-serif';
  ctx.fillStyle = '#3a2a1a';
  ctx.fillText(String(remaining), rx, ry);
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#8a7a6a';
  ctx.fillText('点击跳过', rx, ry + 32);
  return { elapsed: elapsed, remaining: remaining };
}

function design_hitTest(mx, my, w, h) {
  if (mx >= 6 && mx <= 42 && my >= 8 && my <= 56) return 'back';
  var prevH = Math.min(160, h * 0.22);
  var cardY = 80, secY = cardY + prevH + 52, secH = 104;
  var sections = [
    { key: 'stone', map: design_stones, sel: design_stone, y: secY },
    { key: 'board', map: design_boards, sel: design_board, y: secY + secH },
    { key: 'bg',    map: design_bgs,    sel: design_bg,    y: secY + secH * 2 }
  ];
  for (var s = 0; s < sections.length; s++) {
    var sec = sections[s];
    var keys = Object.keys(sec.map);
    var optW = Math.min(52, (w - 40 - (keys.length - 1) * 8) / keys.length);
    var totalW = keys.length * optW + (keys.length - 1) * 8;
    var startX = (w - totalW) / 2;
    var oy = sec.y + 22;
    for (var j = 0; j < keys.length; j++) {
      var ox = startX + j * (optW + 8);
      if (mx >= ox && mx <= ox + optW && my >= oy && my <= oy + 64) {
        return sec.key + ':' + keys[j];
      }
    }
  }
  var btnY = h - 86;
  if (mx >= 20 && mx <= w - 20 && my >= btnY && my <= btnY + 48) return 'start';
  return null;
}

function design_selectHit(hit) {
  if (!hit || hit === 'back' || hit === 'start') return;
  var parts = hit.split(':');
  if (parts[0] === 'stone') design_stone = parts[1];
  else if (parts[0] === 'board') design_board = parts[1];
  else if (parts[0] === 'bg')    design_bg    = parts[1];
}

function invite_hitTest(mx, my, w, h) {

  if (mx >= btnX && mx <= btnX + btnW && my >= b3Y && my <= b3Y + btnH) return 'create';
  var b4Y = b3Y + btnH + btnGap;
  if (mx >= btnX && mx <= btnX + btnW && my >= b4Y && my <= b4Y + btnH) return 'join';
  var startY = h - 90;
  if (mx >= 20 && mx <= w - 20 && my >= startY && my <= startY + 50) return 'start';
  return null;
}

function invite_handleTouch(hit, onReady) {
  if (hit === 'local') { invite_mode = 'local'; invite_roomCode = ''; invite_statusText = ''; network_reset(); isOnline = false; return true; }
  if (hit === 'match') {
    if (!WS.isConnected()) { showToast('未连接到服务器，请稍候重试', 2000); return true; }
    invite_mode = 'match'; invite_roomCode = ''; WS.match();
    showToast('正在匹配对手…', 3000); return true;
  }
  if (hit === 'create') {
    if (!WS.isConnected()) { showToast('未连接到服务器，请稍候重试', 2000); return true; }
    invite_mode = 'create'; WS.createRoom();
    showToast('正在创建房间…', 2000); return true;
  }
  if (hit === 'join') {
    invite_mode = 'join'; invite_roomCode = '';
    var code = prompt('请输入房间号：');
    if (!code || !code.trim()) { invite_mode = 'local'; return true; }
    code = code.trim().toUpperCase();
    if (!WS.isConnected()) { showToast('未连接到服务器', 2000); invite_mode = 'local'; return true; }
    invite_roomCode = code;
    WS.joinRoom(code);
    showToast('正在加入房间 ' + code + '…', 2000); return true;
  }
  if (hit === 'start') {
    if (invite_mode === 'local') { onReady({ online: false }); return false; }
    if (invite_mode === 'match') { showToast('正在匹配对手，请稍候…', 2000); return true; }
    if (invite_mode === 'create') { showToast('等待对手加入房间…', 2000); return true; }
    if (invite_mode === 'join') { showToast('等待加入房间…', 2000); return true; }
  }
  return false;
}

// ── WS 事件注册（初始化时执行一次）──
(function _initWS() {
  // 匹配成功 / 房间 / 对手加入 → 进游戏
  WS.on('matched', function(data) {
    if (invite_mode !== 'match') return;
    invite_roomCode = data.room;
    network_setOnline(data.color, data.room);
    isOnline = true;
    showToast('匹配成功！你执' + (data.color === 'B' ? '⚫黑棋' : '⚪白棋'), 2500);
    enterGame();
  });
  WS.on('room_created', function(data) {
    invite_roomCode = data.room; online_roomCode = data.room;
    showToast('房间已创建！', 2000);
  });
  WS.on('opponent_joined', function(data) {
    if (invite_mode === 'create' && STATE === 'INVITE') {
      network_setOnline(data.color === 'B' ? 'W' : 'B', online_roomCode);
      isOnline = true;
      showToast('对手已加入！对局开始', 2000);
      enterGame();
    }
  });
  WS.on('room_joined', function(data) {
    invite_roomCode = data.room;
    network_setOnline(data.color, data.room);
    isOnline = true;
    showToast('成功加入房间！你执' + (data.color === 'B' ? '⚫黑棋' : '⚪白棋'), 2500);
    enterGame();
  });
  // 对手落子 / Pass
  WS.on('move', function(data) {
    if (!isOnline || STATE !== 'GAME') return;
    var r = placeStone(data.x, data.y, stoneMap, moves, currentIdx, koPoint);
    if (r.success) {
      currentIdx = moves.length - 1;
      currentColor = moves.length % 2 === 0 ? 'B' : 'W';
      koPoint = r.koPoint || null;
      myTurn = true;
      if (data.color === 'B') playBlack(); else playWhite();
      if (isDoublePass(moves)) doEndGame();
    }
  });
  WS.on('pass', function(data) {
    if (!isOnline || STATE !== 'GAME') return;
    passMove(stoneMap, moves, currentIdx, koPoint);
    currentIdx = moves.length - 1;
    currentColor = moves.length % 2 === 0 ? 'B' : 'W';
    koPoint = null; myTurn = true;
    if (isDoublePass(moves)) doEndGame();
  });
  WS.on('resign', function(data) {
    if (!isOnline || STATE !== 'GAME') return;
    showToast('对手认输！你赢了 🎉', 3000);
    gameResult = { winner: online_myColor || (data.color === 'B' ? 'W' : 'B'), diff: 0,
      blackTerritory: 0, whiteTerritory: 0, blackStones: 0, whiteStones: 0, resign: true };
    doEndGame();
  });
  WS.on('disconnect', function() { showToast('对手已断开连接', 3500); });
  WS.on('error', function(data) { showToast(data.msg || '服务器错误，请重试', 2500); });
  // 排行榜
  WS.on('leaderboard', function(data) { leaderboard_globalLoading = false; leaderboard_globalData = data; });
})();

function account_hitTest(mx, my, w, h) {

  var btnsY=avY+avR*2+28,btnW3=62,btnH3=24,btnGap2=10,totalW2=btnW3*2+btnGap2,btnStartX=w/2-totalW2/2;
  if (my>=btnsY&&my<=btnsY+btnH3) { if (mx>=btnStartX&&mx<=btnStartX+btnW3) return 'custom_text'; if (mx>=btnStartX+btnW3+btnGap2&&mx<=btnStartX+totalW2) return 'custom_photo'; }
  if (account_customAvatar) { var resetY=btnsY+btnH3+8; if (mx>=w/2-32&&mx<=w/2+32&&my>=resetY&&my<=resetY+20) return 'custom_reset'; }

// Module: utils/history.js (localStorage version)
// ============================================================
var history_records = [];
var history_loaded = false;
var history_loading = false;
var history_scrollOffset = 0;
var history_screenH = 600;

function history_load(cb) {
  if (history_loading) return;
  history_loading = true;
  try {
    var raw = storageGet('hc_history');
    history_records = raw ? JSON.parse(raw) : [];
  } catch(e) { history_records = []; }
  history_loaded = true;
  history_loading = false;
  if (cb) cb(history_records);
}

function history_saveRecord(record) {
  history_records.unshift(record);
  if (history_records.length > 30) history_records.length = 30;
  storageSet('hc_history', JSON.stringify(history_records));
  history_loaded = true;
}

function history_rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function history_draw(ctx, w, h) {
  ctx.fillStyle = '#faf5eb';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(250,245,235,0.95)';
  ctx.fillRect(0, 0, w, 64);
  ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,64); ctx.lineTo(w,64); ctx.stroke();
  ctx.strokeStyle = '#5a4a3a'; ctx.lineWidth = 2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(20,32); ctx.lineTo(30,23); ctx.moveTo(20,32); ctx.lineTo(30,41); ctx.stroke();
  ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
  ctx.fillStyle = '#3a2a1a';
  ctx.font = 'bold 17px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('历史对局', w/2, 32);
  if (!history_loaded) {
    ctx.fillStyle = '#8a7a6a';
    ctx.font = '14px sans-serif';
    ctx.fillText('加载中…', w/2, h/2);
    return;
  }
  if (!history_records.length) {
    ctx.fillStyle = '#8a7a6a';
    ctx.font = '14px sans-serif';
    ctx.fillText('暂无对局记录', w/2, h/2);
    ctx.font = '12px sans-serif';
    ctx.fillText('完成一局对局后自动记录', w/2, h/2+24);
    return;
  }
  var cardW = w - 32, cardX = 16, cardH = 68, gap = 10;
  var startY = 80 - history_scrollOffset;
  var visibleEnd = h - 20;
  for (var i = 0; i < history_records.length; i++) {
    var cy = startY + i * (cardH + gap);
    if (cy + cardH < 70) continue;
    if (cy > visibleEnd) break;
    var rec = history_records[i];
    var winner = rec.winner === 'B' ? '⚫ 黑胜' : '⚪ 白胜';
    ctx.fillStyle = '#fff';
    history_rrect(ctx, cardX, cy, cardW, cardH, 10); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.lineWidth = 1;
    history_rrect(ctx, cardX, cy, cardW, cardH, 10); ctx.stroke();
    ctx.fillStyle = rec.winner === 'B' ? '#3a2a1a' : '#6a5a4a';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(winner, cardX+14, cy+12);
    ctx.fillStyle = '#8a7a6a';
    ctx.font = '11px sans-serif';
    var detail = (rec.resign ? '认输 · ' : '') + rec.totalMoves + '手 · 差' + rec.diff + '目';
    if (rec.blackTerr !== undefined) {
      detail += ' · 黑' + (rec.blackTerr+rec.blackStones) + '目 白' + (rec.whiteTerr+rec.whiteStones) + '目';
    }
    ctx.fillText(detail, cardX+14, cy+36);
    var d = new Date(rec.createdAt);
    var dateStr = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    ctx.fillText(dateStr, cardX+14, cy+52);
    ctx.fillStyle = '#ccc';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText('›', cardX+cardW-16, cy+cardH/2);
  }
  if (history_records.length > 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↓ 滚轮滑动查看更多 ↓', w/2, h-16);
  }
}

function history_hitTest(mx, my, w, h) {
  if (mx >= 6 && mx <= 42 && my >= 8 && my <= 56) return 'back';
  return null;
}

function history_setScreenH(h) { history_screenH = h; }
function history_scroll(delta) {
  var maxScroll = Math.max(0, history_records.length * 78 - history_screenH + 200);
  history_scrollOffset = Math.max(0, Math.min(maxScroll, history_scrollOffset + delta));
}

// ============================================================
// Main: game.js logic (wx APIs replaced)
// ============================================================
var STATE = 'SPLASH';
var canvas, ctx, offCanvas, offCtx, W, H, dpr, rafId;
var stoneMap = new Map();
var moves = [], currentIdx = -1, currentColor = 'B';
var layout, theme = getTheme();
var isOnline = false, myTurn = true;
var koPoint = null;
var gameResult = null;

// ── Web: set up canvas ──
canvas = document.getElementById('c');
ctx = canvas.getContext('2d');

// Offscreen canvas (double buffer)
offCanvas = document.createElement('canvas');
offCtx = offCanvas.getContext('2d');

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  offCanvas.width  = W * dpr;
  offCanvas.height = H * dpr;
  offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  offCtx.imageSmoothingEnabled = false;
  layout = calcLayout(W, H);
}

// ── Web: pointer events replace wx.onTouchStart ──
function getEventPos(e) {
  var rect = canvas.getBoundingClientRect();
  return { mx: e.clientX - rect.left, my: e.clientY - rect.top };
}

canvas.addEventListener('pointerdown', function(e) {
  var pos = getEventPos(e);
  if (STATE === 'SPLASH')       enterMenu();
  else if (STATE === 'MENU')    handleMenuTouch(pos.mx, pos.my);
  else if (STATE === 'DESIGN')  handleDesignTouch(pos.mx, pos.my);
  else if (STATE === 'INVITE')  handleInviteTouch(pos.mx, pos.my);
  else if (STATE === 'HISTORY')    handleHistoryTouch(pos.mx, pos.my);
  else if (STATE === 'LEADERBOARD') handleLeaderboardTouch(pos.mx, pos.my);
  else if (STATE === 'FORUM')       handleForumTouch(pos.mx, pos.my);
  else if (STATE === 'ACCOUNT')     handleAccountTouch(pos.mx, pos.my);
  else if (STATE === 'GAME')        handleGameTouch(pos.mx, pos.my);
});

// Mouse wheel for history scrolling
canvas.addEventListener('wheel', function(e) {
  if (STATE === 'HISTORY') { e.preventDefault(); history_scroll(e.deltaY); }
  else if (STATE === 'LEADERBOARD') { e.preventDefault(); leaderboard_scroll(e.deltaY); }
  else if (STATE === 'FORUM') { e.preventDefault(); forum_scroll(e.deltaY); }
}, { passive: false });

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && STATE === 'GAME') {
    endGameCleanup(); STATE = 'DESIGN';
  }
});

// Resize handler
window.addEventListener('resize', resizeCanvas);

function init() {
  resizeCanvas();
  splash_init();
  history_setScreenH(H);
  STATE = 'SPLASH';
  loop();
}

// ── Main loop (double buffer) ──
function loop() {
  offCtx.clearRect(0, 0, W, H);
  var c = offCtx;
  if (STATE === 'SPLASH') {
    var r = splash_draw(c, W, H);
    if (r.elapsed >= 5) enterMenu();
  } else if (STATE === 'MENU') {
    drawMenu(c, W, H);
  } else if (STATE === 'DESIGN') {
    design_draw(c, W, H);
  } else if (STATE === 'INVITE') {
    invite_draw(c, W, H, theme);
  } else if (STATE === 'HISTORY') {
    history_draw(c, W, H);
  } else if (STATE === 'LEADERBOARD') {
    leaderboard_draw(c, W, H);
  } else if (STATE === 'FORUM') {
    forum_draw(c, W, H);
  } else if (STATE === 'ACCOUNT') {
    account_draw(c, W, H);
  } else if (STATE === 'GAME') {
    drawGameScene(c);
  }
  ctx.drawImage(offCanvas, 0, 0, W * dpr, H * dpr, 0, 0, W, H);
  rafId = requestAnimationFrame(loop);
}

function enterMenu()  { if (STATE !== 'MENU')  STATE = 'MENU'; }
function enterDesign(){ STATE = 'DESIGN'; }
function enterGame()  {
  theme = getTheme();
  if (isOnline) { stoneMap.clear(); moves = []; currentIdx = -1; currentColor = 'B'; }
  else if (!restoreGame()) { stoneMap.clear(); moves = []; currentIdx = -1; currentColor = 'B'; }
  isOnline = network_isOnline();
  myTurn   = isOnline ? (network_myColor() === 'B') : true;
  koPoint = null;
  gameResult = null;
  STATE = 'GAME';
}

function handleMenuTouch(mx, my) {
  var hit = menuHitTest(mx, my, W, H);
  if (hit === 'duiju') enterDesign();
  else if (hit === 'account') { account_load(); STATE = 'ACCOUNT'; }
  else if (hit === 'history') { history_load(); STATE = 'HISTORY'; }
  else if (hit === 'rank') { leaderboard_open(); }
  else if (hit === 'forum') { forum_enter(); }
}

function handleDesignTouch(mx, my) {
  var hit = design_hitTest(mx, my, W, H);
  if (!hit) return;
  if (hit === 'back') STATE = 'MENU';
  else if (hit === 'start') STATE = 'INVITE';
  else design_selectHit(hit);
}

function handleHistoryTouch(mx, my) {
  var hit = history_hitTest(mx, my, W, H);
  if (hit === 'back') STATE = 'MENU';
}

function handleInviteTouch(mx, my) {
  var hit = invite_hitTest(mx, my, W, H);
  if (!hit) return;
  if (hit === 'back') { invite_reset(); STATE = 'DESIGN'; return; }
  invite_handleTouch(hit, function (res) {
    if (res && !res.err) {
      if (res.online !== false) {
        network_onOpponentMove(function (m) {
          if (m.x < 0) {
            passMove(stoneMap, moves, currentIdx, koPoint);
            koPoint = null;
          } else {
            var r = placeStone(m.x, m.y, stoneMap, moves, currentIdx, koPoint);
            if (r.success) koPoint = r.koPoint || null;
          }
          currentIdx = moves.length - 1;
          currentColor = moves.length % 2 === 0 ? 'B' : 'W';
          myTurn = true;
          if (m.x >= 0) {
            if (m.color === 'B') playBlack();
            else playWhite();
          }
          if (isDoublePass(moves)) doEndGame();
        });
      }
      enterGame();
    }
  });
}

function drawGameScene(c) {
  c.fillStyle = theme.bg;
  c.fillRect(0, 0, W, H);
  drawBgDecor(c, W, H, layout);
  drawBoard(c, layout, theme);
  drawStones(c, stoneMap, moves, currentIdx, layout, theme);
  drawTopBar(c, W, currentColor, moves.length, isOnline, myTurn);
  drawBottomBar(c, W, H);
  if (gameResult) drawResultPopup(c, W, H, gameResult);
}

function handleGameTouch(mx, my) {
  if (gameResult) {
    if (popupHitTest(mx, my, W, H) === 'menu') { endGameCleanup(); STATE = 'MENU'; }
    return;
  }
  var hit = board_hitTest(mx, my, W, H, layout);
  if (!hit) return;
  if (hit === 'back')       { endGameCleanup(); STATE = 'DESIGN'; }
  else if (hit === 'undo')   doUndo();
  else if (hit === 'pass' || hit === 'pass2') doPass();
  else if (hit === 'clear')  doClear();
  else if (hit === 'resign') doResign();
  else if (hit === 'rematch') doRematch();
  else if (hit === 'board') {
    if (isOnline && !myTurn) return;
    var pos = pixelToBoard(mx, my, layout);
    if (pos) doPlace(pos.x, pos.y);
  }
}

function doPlace(x, y) {
  if (isOnline && !myTurn) return;
  var r = placeStone(x, y, stoneMap, moves, currentIdx, koPoint);
  if (r.success) {
    currentIdx = moves.length - 1;
    currentColor = moves.length % 2 === 0 ? 'B' : 'W';
    koPoint = r.koPoint || null;
    saveGame();
    if (r.color === 'B') playBlack();
    else                 playWhite();
    if (isOnline) { network_syncMove(x, y, r.color); myTurn = false; }
    if (isDoublePass(moves)) doEndGame();
  } else if (r.reason === 'ko') {
    showToast('打劫！不能立刻回提', 1500);
  } else if (r.reason === 'suicide') {
    showToast('禁着点，不可落子', 1200);
  }
}

function doPass() {
  if (isOnline && !myTurn) return;
  var r = passMove(stoneMap, moves, currentIdx, koPoint);
  if (r.success) {
    currentIdx = moves.length - 1;
    currentColor = moves.length % 2 === 0 ? 'B' : 'W';
    koPoint = null;
    saveGame();
    if (isOnline) { WS.sendPass(); myTurn = false; }
    if (isDoublePass(moves)) doEndGame();
  }
}

function doResign() {
  if (isOnline && !myTurn) return;
  showModal('认输', '确定认输吗？', function() {
    gameResult = { winner: currentColor === 'B' ? 'W' : 'B', diff: 0,
      blackTerritory: 0, whiteTerritory: 0, blackStones: 0, whiteStones: 0,
      resign: true };
    if (isOnline) { WS.sendResign(); myTurn = false; }
    doEndGame();
  });
}

function doRematch() {
  if (isOnline) { showToast('联网对局不支持重开', 1500); return; }
  showModal('重新开局', '确定清空棋盘重新开始吗？', function() {
    stoneMap.clear(); moves = []; currentIdx = -1; currentColor = 'B';
    koPoint = null; gameResult = null; myTurn = true;
    storageRemove('hc_game');
  });
}

function doEndGame() {
  if (!gameResult) gameResult = calculateScore(stoneMap);
  var record = {
    winner:      gameResult.winner,
    diff:        gameResult.diff,
    blackTerr:   gameResult.blackTerritory || 0,
    whiteTerr:   gameResult.whiteTerritory || 0,
    blackStones: gameResult.blackStones || 0,
    whiteStones: gameResult.whiteStones || 0,
    totalMoves:  moves.length,
    resign:      gameResult.resign || false,
    createdAt:   Date.now()
  };
  history_saveRecord(record);
  if (network_isOnline()) network_endGame();
  storageRemove('hc_game');
  saveGame();
}

function endGameCleanup() {
  if (network_isOnline()) network_endGame();
  network_reset();
  isOnline = false; myTurn = true;
  gameResult = null; koPoint = null;
  stoneMap.clear(); moves = []; currentIdx = -1; currentColor = 'B';
}

function doUndo() {
  if (isOnline) { showToast('联网对局不支持悔棋', 1500); return; }
  var r = undoMove(stoneMap, moves, currentIdx);
  if (r.success) { currentIdx = r.newIdx; currentColor = moves.length % 2 === 0 ? 'B' : 'W'; saveGame(); }
}

function doClear() {
  if (isOnline) { showToast('联网对局不支持清空棋盘', 1500); return; }
  if (!moves.length) return;
  showModal('清空棋盘', '确定清空当前对局吗？', function() {
    stoneMap.clear(); moves = []; currentIdx = -1; currentColor = 'B';
    storageRemove('hc_game');
  });
}

function saveGame() {
  if (isOnline) return;
  storageSet('hc_game', JSON.stringify({ moves: moves.map(function(m){return {x:m.x,y:m.y,color:m.color};}), currentIdx: currentIdx }));
}

function restoreGame() {
  try {
    var raw = storageGet('hc_game'); if (!raw) return false;
    var d = JSON.parse(raw); if (d.moves && d.moves.length) { moves = d.moves; currentIdx = d.currentIdx != null ? d.currentIdx : moves.length - 1; rebuildStones(stoneMap, moves, currentIdx); currentColor = moves.length % 2 === 0 ? 'B' : 'W'; return true; }
  } catch(e) { storageRemove('hc_game'); }
  return false;
}

// ── Start ──
init();
</script>
